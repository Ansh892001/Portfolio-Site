@if (data(); as portfolio) {
<header [class.scrolled]="isScrolled()" [class.menu-open]="menuOpen()">
  <div class="container header-inner">
    <a href="#" class="logo">
      <span class="logo-bracket">&lt;</span>
      <span class="logo-text">{{ portfolio.profile.initials }}</span>
      <span class="logo-bracket">/&gt;</span>
    </a>

    <nav class="nav-desktop">
      @for (link of portfolio.navLinks; track link.href) {
      <a [href]="link.href" class="nav-link" (click)="navigate($event, link.href)">{{ link.label }}</a>
      }
    </nav>

    <a href="#contact" class="btn btn-primary nav-cta" (click)="navigate($event, '#contact')">Let's Talk</a>

    <button class="menu-toggle" (click)="toggleMenu()" [attr.aria-expanded]="menuOpen()"
      aria-label="Toggle navigation menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  <nav class="nav-mobile" [class.open]="menuOpen()">
    @for (link of portfolio.navLinks; track link.href) {
    <a [href]="link.href" class="nav-link" (click)="navigate($event, link.href)">{{
      link.label
      }}</a>
    }
    <a href="#contact" class="btn btn-primary" (click)="navigate($event, '#contact')">Let's Talk</a>
  </nav>
</header>
}
